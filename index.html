<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moon Dust 月岩尘 | 影音阅读记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@300;400;500&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◇</text></svg>">
  <meta name="description" content="Moon Dust - 一个诗意的影音阅读记录应用">
  <style>
/* ✨ CSS Variables - 优化后的对比度 */
:root {
  --bg-primary: #121212;
  --surface: rgba(255, 255, 255, 0.03);
  --surface-hover: rgba(255, 255, 255, 0.08); /* 提升hover对比度 */
  --text-primary: #ECECEC; /* 提升主文本对比度 */
  --text-secondary: #9A9A9A; /* 提升次要文本对比度 */
  --accent: #C9A87C;

  --glass-bg: rgba(20, 20, 28, 0.65);
  --glass-border: rgba(255, 255, 255, 0.12); /* 提升边框对比度 */

  --font-serif: 'Noto Serif SC', 'PT Serif', Georgia, serif;
  --font-display: 'Playfair Display', Georgia, serif;

  --transition-fast: 0.2s ease;
  --transition-medium: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* 弹性动画 */

  --z-modal: 1000;
  --z-buttons: 1010;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  min-height: 100vh;
  font-family: var(--font-serif);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

.noise-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9998;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

.scene-backgrounds {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
}

.scene-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s ease;
  pointer-events: none;
  background-size: cover;
  background-position: center;
}

.scene-bg.active {
  opacity: 1;
}

.scene-bg[data-scene="forest"] {
  background-image: linear-gradient(160deg, rgba(13, 31, 18, 0.85), rgba(26, 58, 31, 0.7), rgba(45, 90, 61, 0.6)), url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80');
}

.scene-bg[data-scene="starry"] {
  background-image: linear-gradient(180deg, rgba(5, 5, 16, 0.7), rgba(10, 10, 32, 0.6), rgba(15, 15, 37, 0.5)), url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920&q=80');
}

.stars-layer {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(1px 1px at 5% 10%, rgba(255, 255, 255, 0.8), transparent),
    radial-gradient(1px 1px at 15% 25%, rgba(255, 255, 255, 0.6), transparent),
    radial-gradient(2px 2px at 25% 5%, rgba(255, 255, 255, 0.9), transparent),
    radial-gradient(1px 1px at 35% 35%, rgba(255, 255, 255, 0.5), transparent),
    radial-gradient(1px 1px at 45% 15%, rgba(255, 255, 255, 0.7), transparent),
    radial-gradient(2px 2px at 55% 45%, rgba(255, 255, 255, 0.4), transparent),
    radial-gradient(1px 1px at 65% 25%, rgba(255, 255, 255, 0.8), transparent),
    radial-gradient(1px 1px at 75% 55%, rgba(255, 255, 255, 0.6), transparent),
    radial-gradient(2px 2px at 85% 35%, rgba(255, 255, 255, 0.5), transparent),
    radial-gradient(1px 1px at 95% 65%, rgba(255, 255, 255, 0.7), transparent);
}

.twinkling-stars {
  position: absolute;
  width: 100%;
  height: 100%;
  animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.scene-bg[data-scene="stream"] {
  background-image: linear-gradient(180deg, rgba(10, 21, 32, 0.75), rgba(21, 37, 53, 0.65), rgba(26, 53, 69, 0.55)), url('https://images.unsplash.com/photo-1501756741507-18b76cd29a65?w=1920&q=80');
}

.scene-bg[data-scene="desert"] {
  background-image: linear-gradient(180deg, rgba(26, 26, 26, 0.8), rgba(42, 37, 32, 0.7), rgba(58, 48, 37, 0.6)), url('https://images.unsplash.com/photo-1509316785289-025f3ee8679a?w=1920&q=80');
}

.main-container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 32px 20px;
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.app-title {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: 0.4em;
  color: var(--text-secondary);
  opacity: 0.6;
}

.header-right {
  display: flex;
  gap: 8px;
}

.scene-btn {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 6px;
  padding: 8px 14px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.scene-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.3);
  color: rgba(255, 255, 255, 0.9);
}

.scene-btn.active {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.4);
  color: #ffffff;
}

.quote-section {
  text-align: center;
  padding: 40px 0;
  opacity: 0;
  animation: fadeInUp 0.8s ease forwards;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
  from { opacity: 0; transform: translateY(20px); }
}

.quote-content {
  margin-bottom: 40px;
}

.main-quote {
  font-family: var(--font-serif);
  font-size: clamp(16px, 4vw, 24px);
  font-weight: 400;
  letter-spacing: 0.03em;
  line-height: 1.6;
  color: #ffffff;
  margin-bottom: 12px;
  text-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 60px rgba(0, 0, 0, 0.6);
}

.quote-author {
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: rgba(255, 255, 255, 0.6);
  opacity: 0;
}

.quote-divider {
  width: 50px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201, 168, 124, 0.6), transparent);
  margin: 20px auto 0;
}

.entry-container {
  max-width: 480px;
  margin: 0 auto 40px;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.2s forwards;
}

.glass-card {
  background: rgba(10, 10, 15, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 20px;
}

.type-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.type-btn {
  flex: 1;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.type-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 255, 255, 0.8);
}

.type-btn.active {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.35);
  color: #ffffff;
}

.search-wrapper {
  display: flex;
  gap: 8px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  padding: 4px;
}

.search-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px 14px;
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
}

.search-input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.search-btn {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 6px;
  padding: 10px 18px;
  font-family: var(--font-display);
  font-size: 12px;
  color: rgba(255, 255, 255, 0.7);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.search-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.4);
  color: #ffffff;
}

.library-entrance {
  text-align: center;
  padding: 20px 0;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.4s forwards;
}

/* ✨ 库入口按钮 - 增强微动效 */
.library-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 30px;
  padding: 14px 28px;
  cursor: pointer;
  transition: all var(--transition-medium);
  position: relative;
  overflow: hidden;
}

/* 按钮光泽效果 */
.library-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
  transition: left 0.5s ease;
}

.library-btn:hover::before {
  left: 100%;
}

.library-btn:hover {
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(201, 168, 124, 0.6);
  transform: translateY(-3px) scale(1.02); /* 增强hover效果 */
  box-shadow: 0 12px 40px rgba(201, 168, 124, 0.2), 0 4px 8px rgba(0, 0, 0, 0.4);
}

.library-btn:active {
  transform: translateY(-1px) scale(0.98);
  transition: all 0.1s ease;
}

.library-btn-icon {
  font-size: 18px;
  color: var(--accent);
}

.library-btn-text {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.8);
}

.library-btn-count {
  background: var(--accent);
  color: #0a0a0f;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
}

.modal-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: var(--z-modal);
  display: none;
  pointer-events: none;
}

.modal-layer.active {
  display: block;
  pointer-events: auto;
}

.modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.glass-panel {
  position: absolute;
  background: rgba(15, 15, 20, 0.92);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
  z-index: var(--z-modal);
  opacity: 0;
  visibility: hidden;
  transform: scale(0.95) translateY(20px);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.glass-panel.active {
  opacity: 1;
  visibility: visible;
  transform: scale(1) translateY(0);
}

.poster-modal {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: min(92vw, 800px);
  max-height: 85vh;
  overflow: hidden;
}

.poster-modal.active {
  transform: translate(-50%, -50%) scale(1);
}

.poster-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.poster-modal-title {
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.8);
}

.poster-modal-body {
  padding: 16px 20px;
  max-height: calc(85vh - 80px);
  overflow-y: auto;
}

.poster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 12px;
}

.poster-item {
  position: relative;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 2/3;
  transition: all var(--transition-medium);
}

.poster-item:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.poster-item:hover::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid rgba(201, 168, 124, 0.6);
  border-radius: 8px;
}

.poster-item-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: rgba(255, 255, 255, 0.05);
}

.poster-placeholder {
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: rgba(255, 255, 255, 0.3);
}

.poster-item-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px 6px;
  background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.poster-item:hover .poster-item-info {
  opacity: 1;
}

.poster-item-title {
  font-size: 10px;
  color: #fff;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.poster-upload-option {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

.upload-own-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px dashed rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  padding: 16px;
  font-family: var(--font-display);
  font-size: 13px;
  color: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.upload-own-btn:hover {
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(201, 168, 124, 0.4);
  color: rgba(255, 255, 255, 0.8);
}

.upload-own-icon {
  font-size: 18px;
}

.poster-modal.loading .poster-modal-body {
  opacity: 0.3;
}

.poster-modal.loading .poster-modal-loading {
  display: flex;
}

.poster-modal-loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.loading-spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-top-color: rgba(201, 168, 124, 0.8);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.poster-modal-loading span {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
}

.review-modal {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: min(94vw, 700px);
  max-height: 90vh;
  overflow: hidden;
}

.review-modal.active {
  transform: translate(-50%, -50%) scale(1);
}

.review-modal-content {
  display: flex;
  min-height: 400px;
}

.review-poster-section {
  width: 180px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.review-poster-img {
  width: 100%;
  flex: 1;
  object-fit: cover;
  border-radius: 16px 0 0 16px;
  min-height: 280px;
  background: rgba(255, 255, 255, 0.05);
}

.upload-poster-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px dashed rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.upload-poster-btn:hover {
  background: rgba(0, 0, 0, 0.6);
  border-color: rgba(201, 168, 124, 0.5);
}

.upload-icon {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.5);
}

.upload-text {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
}

.review-form-section {
  flex: 1;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
}

.review-title-input,
.review-year-input {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--text-primary);
  outline: none;
  margin-bottom: 12px;
}

.review-title-input {
  font-size: 18px;
  font-weight: 500;
}

.review-year-input {
  font-size: 13px;
  color: var(--text-secondary);
}

.review-title-input::placeholder,
.review-year-input::placeholder {
  color: rgba(255, 255, 255, 0.3);
}

.review-rating-section {
  margin-bottom: 16px;
}

.star-rating {
  display: flex;
  gap: 2px;
}

/* ✨ 评分星星 - 弹性动画 */
.star-rating .star {
  font-size: 22px;
  cursor: pointer;
  color: rgba(255, 255, 255, 0.2);
  transition: all var(--transition-bounce);
  display: inline-block;
}

.star-rating .star:hover,
.star-rating .star.active {
  color: var(--accent);
  transform: scale(1.2) rotate(-5deg);
  text-shadow: 0 0 12px rgba(201, 168, 124, 0.6);
}

.star-rating .star:active {
  transform: scale(1.4) rotate(-10deg);
  transition: all 0.1s ease;
}

.review-textarea-section {
  flex: 1;
  margin-bottom: 16px;
}

.review-textarea {
  width: 100%;
  height: 100%;
  min-height: 100px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: var(--font-serif);
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-primary);
  resize: none;
  outline: none;
}

.review-textarea::placeholder {
  color: rgba(255, 255, 255, 0.3);
}

.review-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  position: relative;
  z-index: var(--z-buttons);
}

.review-action-btn {
  padding: 12px 18px;
  border-radius: 8px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  z-index: var(--z-buttons);
  pointer-events: auto;
}

.review-action-btn.abandon {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: rgba(255, 255, 255, 0.5);
}

.review-action-btn.abandon:hover {
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 255, 255, 0.8);
}

.review-action-btn.save-later {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: rgba(255, 255, 255, 0.7);
}

.review-action-btn.save-later:hover {
  background: rgba(255, 255, 255, 0.08);
  color: #ffffff;
}

.review-action-btn.root-btn {
  background: rgba(201, 168, 124, 0.9);
  border: 1px solid var(--accent);
  color: #0a0a0f;
  font-weight: 500;
}

.review-action-btn.root-btn:hover {
  background: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201, 168, 124, 0.4);
}

.modal-close-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;

const Storage = {
  getRecords() {

  },
  saveRecords(records) {

    this.saveRecords(records);

  },

  }
};

function getSeason(date = new Date()) {
  const month = date.getMonth();
  if (month >= 2 && month <= 4) return 'spring';
  if (month >= 5 && month <= 7) return 'summer';
  if (month >= 8 && month <= 10) return 'autumn';
  return 'winter';
}

function getSeasonName(season) {
  return { spring: 'Spring', summer: 'Summer', autumn: 'Autumn', winter: 'Winter' }[season];
}

function getMonthName(month) {
  return ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][month];
}

// ✨ 带超时的 fetch 函数（国内访问国外 API 优化）
async function fetchWithTimeout(url, timeout = 10000) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), timeout);

  try {
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    return response;
  } catch (error) {
    clearTimeout(timeoutId);
    if (error.name === 'AbortError') {
      throw new Error('请求超时，请检查网络连接或稍后重试');
    }
    throw error;
  }
}

const DoubanService = {
  async searchMovieTV(query) {
    try {
      // ⚠️ 豆瓣反爬机制：需要正确的请求头
      const url = `${CONFIG.DOUBAN_SEARCH_URL}?q=${encodeURIComponent(query)}`;

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);

      const res = await fetch(url, {
        method: 'GET',
        headers: {
          'Accept': 'application/json',
          'Referer': 'https://movie.douban.com/',
          'User-Agent': navigator.userAgent
        },
        signal: controller.signal,
        mode: 'cors',
        credentials: 'omit'
      });

      clearTimeout(timeoutId);
      const data = await res.json();

      if (!data || data.length === 0) {
        console.log('豆瓣返回空数据，可能被反爬拦截');
        return [];
      }

      return data.map(item => ({
        id: item.id,
        type: item.sub_title?.includes('电视剧') || item.sub_title?.includes('剧集') || item.type === 'tv' ? 'tv' : 'movie',
        title: item.title,
        year: item.year || '',
        poster: item.img || null,
        source: 'douban'
      }));
    } catch (error) {
      console.error('豆瓣搜索失败:', error);
      return [];
    }
  },

  async searchBooks(query) {
    try {
      // 豆瓣图书搜索（使用搜索页面接口）
      const res = await fetchWithTimeout(
        `https://search.douban.com/book/subject_search?search_text=${encodeURIComponent(query)}&cat=1001`,
        8000
      );
      const html = await res.text();

      // 简单解析（实际生产环境建议用后端代理）
      const results = [];
      const regex = /<a[^>]*href="https:\/\/book\.douban\.com\/subject\/(\d+)\/"[^>]*title="([^"]+)"/g;
      let match;
      let count = 0;

      while ((match = regex.exec(html)) !== null && count < 20) {
        results.push({
          id: match[1],
          type: 'book',
          title: match[2],
          year: '',
          poster: null, // 豆瓣图书搜索页不直接提供封面
          source: 'douban'
        });
        count++;
      }

      return results;
    } catch (error) {
      console.error('豆瓣图书搜索失败:', error);
      return [];
    }
  }
};

async function performSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  showPosterModal();
  showLoading();

  const searchBtn = document.getElementById('searchBtn');
  const originalBtnText = searchBtn.textContent;
  searchBtn.textContent = '搜索中...';
  searchBtn.disabled = true;

  try {
    let results = [];

    // ✨ 优先使用豆瓣（国内快）
    if (CONFIG.USE_DOUBAN_FIRST) {
      if (State.currentType === 'book') {
        // 豆瓣图书搜索
        results = await DoubanService.searchBooks(query);

        // 如果豆瓣结果少，尝试 Google Books 补充
        if (results.length < 5) {
          try {
            const items = await GoogleBooksService.search(query);
            const googleResults = items.map(i => ({
              id: i.id, type: 'book', title: i.volumeInfo.title || 'Unknown',
              year: i.volumeInfo.publishedDate?.substr(0, 4) || '',
              poster: GoogleBooksService.getCoverUrl(i.volumeInfo),
              source: 'google'
            }));
            results = [...results, ...googleResults];
          } catch (e) {
            console.log('Google Books 备用搜索失败:', e);
          }
        }
      } else {
        // 豆瓣电影/电视剧搜索
        results = await DoubanService.searchMovieTV(query);

        // 过滤类型
        if (State.currentType === 'movie') {
          results = results.filter(r => r.type === 'movie');
        } else if (State.currentType === 'tv') {
          results = results.filter(r => r.type === 'tv');
        }

        // 如果豆瓣结果少，尝试 TMDB 补充
        if (results.length < 5) {
          try {
            let tmdbResults = [];
            if (State.currentType === 'movie') {
              const movies = await TMDBService.searchMovies(query);
              tmdbResults = movies.map(m => ({
                id: String(m.id), type: 'movie', title: m.title || 'Unknown',
                year: (m.release_date || '').substr(0, 4),
                poster: TMDBService.getPosterUrl(m.poster_path),
                source: 'tmdb'
              }));
            } else {
              const shows = await TMDBService.searchTV(query);
              tmdbResults = shows.map(s => ({
                id: String(s.id), type: 'tv', title: s.name || 'Unknown',
                year: (s.first_air_date || '').substr(0, 4),
                poster: TMDBService.getPosterUrl(s.poster_path),
                source: 'tmdb'
              }));
            }
            results = [...results, ...tmdbResults];
          } catch (e) {
            console.log('TMDB 备用搜索失败:', e);
          }
        }
      }
    } else {
      // 使用原来的 TMDB/Google Books
      if (State.currentType === 'book') {
        const items = await GoogleBooksService.search(query);
        results = items.map(i => ({
          id: i.id, type: 'book', title: i.volumeInfo.title || 'Unknown',
          year: i.volumeInfo.publishedDate?.substr(0, 4) || '',
          poster: GoogleBooksService.getCoverUrl(i.volumeInfo)
        }));
      } else if (State.currentType === 'movie') {
        const movies = await TMDBService.searchMovies(query);
        results = movies.map(m => ({
          id: String(m.id), type: 'movie', title: m.title || 'Unknown',
          year: (m.release_date || '').substr(0, 4),
          poster: TMDBService.getPosterUrl(m.poster_path)
        }));
      } else {
        const shows = await TMDBService.searchTV(query);
        results = shows.map(s => ({
          id: String(s.id), type: 'tv', title: s.name || 'Unknown',
          year: (s.first_air_date || '').substr(0, 4),
          poster: TMDBService.getPosterUrl(s.poster_path)
        }));
      }
    }

    State.searchResults = results;
    hideLoading();
    searchBtn.textContent = originalBtnText;
    searchBtn.disabled = false;
    renderPosterGrid(results);
  } catch (error) {
    hideLoading();
    searchBtn.textContent = originalBtnText;
    searchBtn.disabled = false;
    console.error('搜索失败:', error);

    // 显示友好的错误提示
    const grid = document.getElementById('posterGrid');
    grid.innerHTML = `
      <div style="text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5);">
        <div style="font-size: 48px; margin-bottom: 16px;">⏱️</div>
        <div style="font-size: 14px; margin-bottom: 8px;">搜索失败</div>
        <div style="font-size: 12px; opacity: 0.6;">
          请检查网络连接或稍后重试
        </div>
      </div>
    `;
  }
}

// ✨ 优化后的图片加载函数 - 支持重试和更好的错误处理
async function loadImageWithRetry(url, maxRetries = 2) {
  for (let i = 0; i <= maxRetries; i++) {
    try {
      const img = new Image();
      img.crossOrigin = 'anonymous';

      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('图片加载超时')), 10000);

        img.onload = () => {
          clearTimeout(timeout);
          resolve();
        };

        img.onerror = () => {
          clearTimeout(timeout);
          reject(new Error('图片加载失败'));
        };

        // 第一次直接加载,失败后添加时间戳避免缓存
        if (i === 0) {
          img.src = url;
        } else {
          img.src = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
        }
      });

      return img;
    } catch (error) {
      console.warn(`图片加载失败 (尝试 ${i + 1}/${maxRetries + 1}):`, error.message);
      if (i === maxRetries) {
        return null;
      }
      // 递增延迟重试
      await new Promise(resolve => setTimeout(resolve, 300 * (i + 1)));
    }
  }
  return null;
}

async function exportCard() {
  if (!currentDetailRecord) return;

  const record = currentDetailRecord;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { alpha: false });

  // 2倍分辨率,导出更清晰
  const scale = 2;
  canvas.width = 600 * scale;
  canvas.height = 400 * scale;
  ctx.scale(scale, scale);

  // ✨ 1. 深色木质/皮革背景纹理
  const bgGradient = ctx.createLinearGradient(0, 0, 600, 400);
  bgGradient.addColorStop(0, '#3a2f26');
  bgGradient.addColorStop(0.5, '#2d2419');
  bgGradient.addColorStop(1, '#3a2f26');
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, 600, 400);

  // 木质纹理噪点
  for (let i = 0; i < 3000; i++) {
    const x = Math.random() * 600;
    const y = Math.random() * 400;
    ctx.fillStyle = `rgba(${Math.random() > 0.5 ? '80,60,40' : '20,15,10'},${Math.random() * 0.15})`;
    ctx.fillRect(x, y, Math.random() * 2, Math.random() * 0.5);
  }

  // ✨ 2. 泛黄纸张区域 (#F4F1EA)
  const paperX = 60;
  const paperY = 30;
  const paperW = 520;
  const paperH = 340;

  // 纸张阴影 (页面弯曲效果)
  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetX = -3;
  ctx.shadowOffsetY = 3;
  ctx.fillStyle = '#F4F1EA';
  ctx.fillRect(paperX, paperY, paperW, paperH);
  ctx.restore();

  // ✨ 增强纸张纹理（细腻的纤维质感）
  for (let i = 0; i < 1200; i++) {
    const x = paperX + Math.random() * paperW;
    const y = paperY + Math.random() * paperH;
    const brightness = Math.random() > 0.5 ? 220 : 200;
    ctx.fillStyle = `rgba(${brightness},${brightness - 20},${brightness - 50},${Math.random() * 0.12})`;
    ctx.fillRect(x, y, Math.random() * 1.5, Math.random() * 0.8);
  }

  // 纸张边缘阴影（增强立体感）
  ctx.fillStyle = 'rgba(180, 160, 140, 0.08)';
  ctx.fillRect(paperX, paperY, paperW, 4);
  ctx.fillRect(paperX, paperY, 4, paperH);

  // ✨ 3. 金属活页环 (左侧中缝处)
  const ringCount = 3;
  const ringSpacing = paperH / (ringCount + 1);

  for (let i = 0; i < ringCount; i++) {
    const ringY = paperY + ringSpacing * (i + 1);
    const ringX = paperX - 15;
    const ringRadius = 8;

    // 金属圆环外圈 (深色阴影)
    const ringGradient = ctx.createRadialGradient(ringX, ringY, 0, ringX, ringY, ringRadius);
    ringGradient.addColorStop(0, '#888');
    ringGradient.addColorStop(0.6, '#555');
    ringGradient.addColorStop(1, '#333');
    ctx.fillStyle = ringGradient;
    ctx.beginPath();
    ctx.arc(ringX, ringY, ringRadius, 0, Math.PI * 2);
    ctx.fill();

    // 金属高光
    const highlightGradient = ctx.createRadialGradient(ringX - 2, ringY - 2, 0, ringX, ringY, ringRadius);
    highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
    highlightGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
    highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = highlightGradient;
    ctx.beginPath();
    ctx.arc(ringX, ringY, ringRadius, 0, Math.PI * 2);
    ctx.fill();

    // 内圈空洞
    ctx.fillStyle = '#2d2419';
    ctx.beginPath();
    ctx.arc(ringX, ringY, ringRadius - 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // ✨ 4. 手帐横线（淡淡的背景线，不干扰阅读）
  ctx.strokeStyle = 'rgba(200, 180, 160, 0.18)'; // 降低不透明度，作为纸张纹理
  ctx.lineWidth = 0.6;
  const lineStart = paperX + 15;
  const lineEnd = paperX + paperW - 20;
  for (let y = paperY + 50; y < paperY + paperH - 20; y += 24) {
    ctx.beginPath();
    ctx.moveTo(lineStart, y);
    ctx.lineTo(lineEnd, y);
    ctx.stroke();
  }

  // ✨ 5. 侧边标签 (带深度效果)
  const tabX = paperX + paperW;
  const tabY = paperY + 40;
  const tabW = 20;
  const tabH = 60;

  // 标签阴影
  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;

  // 标签渐变 (深度感)
  const tabGradient = ctx.createLinearGradient(tabX, 0, tabX + tabW, 0);
  tabGradient.addColorStop(0, '#C9A87C');
  tabGradient.addColorStop(0.5, '#B39568');
  tabGradient.addColorStop(1, '#9d8256');
  ctx.fillStyle = tabGradient;
  ctx.fillRect(tabX, tabY, tabW, tabH);
  ctx.restore();

  // 标签内阴影 (顶部和底部)
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(tabX, tabY, tabW, 3);
  ctx.fillRect(tabX, tabY + tabH - 3, tabW, 3);

  // ✨ 月份/季节标识（右上角，斜体 Times Roman）
  ctx.save();
  ctx.font = 'italic 14px "Times New Roman", serif';
  ctx.fillStyle = 'rgba(150, 130, 110, 0.5)';
  ctx.textAlign = 'right';
  const monthLabel = (() => {
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'];
    const match = record.date.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (match) {
      const monthIndex = parseInt(match[2]) - 1;
      const year = match[1];
      return `${months[monthIndex]} ${year}`;
    }
    return record.date;
  })();
  ctx.fillText(monthLabel, paperX + paperW - 25, paperY + 22);
  ctx.restore();

  // ✨ 6. Polaroid 风格海报 (旋转 + 白边 + 纸胶带)
  if (record.poster) {
    const img = await loadImageWithRetry(record.poster);
    const polaroidX = paperX + 40;
    const polaroidY = paperY + 50;
    const polaroidW = 140;
    const polaroidH = 200;
    const borderW = 10;
    const rotation = -2 * Math.PI / 180; // -2度旋转

    ctx.save();
    ctx.translate(polaroidX + polaroidW / 2, polaroidY + polaroidH / 2);
    ctx.rotate(rotation);

    // Polaroid 白边背景
    ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 6;
    ctx.fillStyle = '#FEFEFE';
    ctx.fillRect(-polaroidW / 2 - borderW, -polaroidH / 2 - borderW, polaroidW + borderW * 2, polaroidH + borderW * 3);

    if (img) {
      // 照片本体
      ctx.drawImage(img, -polaroidW / 2, -polaroidH / 2, polaroidW, polaroidH);
    } else {
      // 占位符
      ctx.fillStyle = '#E8E8E8';
      ctx.fillRect(-polaroidW / 2, -polaroidH / 2, polaroidW, polaroidH);
      ctx.fillStyle = 'rgba(201, 168, 124, 0.5)';
      ctx.font = '20px serif';
      ctx.textAlign = 'center';
      ctx.fillText('◇', 0, 0);
    }

    ctx.restore();

    // ✨ 纸胶带 (半透明,粘贴在左上角和右上角)
    // 左上角胶带
    ctx.save();
    ctx.translate(polaroidX + 10, polaroidY - 8);
    ctx.rotate(-15 * Math.PI / 180);
    ctx.fillStyle = 'rgba(240, 230, 200, 0.7)';
    ctx.fillRect(0, 0, 50, 16);
    ctx.strokeStyle = 'rgba(180, 170, 140, 0.3)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(0, 0, 50, 16);
    ctx.restore();

    // 右上角胶带
    ctx.save();
    ctx.translate(polaroidX + polaroidW - 10, polaroidY - 5);
    ctx.rotate(10 * Math.PI / 180);
    ctx.fillStyle = 'rgba(240, 230, 200, 0.7)';
    ctx.fillRect(0, 0, 45, 16);
    ctx.strokeStyle = 'rgba(180, 170, 140, 0.3)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(0, 0, 45, 16);
    ctx.restore();
  }

  // ✨ 7. 手写风格文本内容 (在横线纸上)
  ctx.textAlign = 'left';

  // 标题 (手写感)
  ctx.fillStyle = '#4a3f35';
  ctx.font = 'bold 22px serif';
  const title = record.title.length > 14 ? record.title.substring(0, 14) + '...' : record.title;
  ctx.fillText(title, paperX + 240, paperY + 70);

  // 类型和年份
  ctx.fillStyle = '#7a6f65';
  ctx.font = '13px serif';
  const typeText = record.type === 'book' ? '📚 书籍' : record.type === 'tv' ? '📺 剧集' : '🎬 电影';
  ctx.fillText(`${typeText} · ${record.year || ''}`, paperX + 240, paperY + 95);

  // 评分星星 (复古金色)
  ctx.fillStyle = '#C9A87C';
  ctx.font = '16px serif';
  ctx.fillText('★'.repeat(record.rating) + '☆'.repeat(5 - record.rating), paperX + 240, paperY + 122);

  // 日期标签
  ctx.fillStyle = '#9a8f85';
  ctx.font = '11px serif';
  ctx.fillText(`📅 ${record.date}`, paperX + 240, paperY + 145);

  // 评论内容 (手写体)
  if (record.comment) {
    ctx.fillStyle = '#5a5045';
    ctx.font = '13px serif';
    const maxWidth = 300;
    const lineHeight = 24; // 对齐横线
    const lines = wrapText(ctx, record.comment, maxWidth);

    lines.forEach((line, i) => {
      if (i < 6) {
        ctx.fillText(line, paperX + 240, paperY + 170 + i * lineHeight);
      }
    });
  } else {
    ctx.fillStyle = 'rgba(90, 80, 70, 0.4)';
    ctx.font = 'italic 13px serif';
    ctx.fillText('— 此人尚未留下隻字片語 —', paperX + 240, paperY + 170);
  }

  // ✨ 8. 复古水印印章 (右下角)
  ctx.save();
  ctx.translate(paperX + paperW - 60, paperY + paperH - 30);
  ctx.rotate(-8 * Math.PI / 180);
  ctx.strokeStyle = 'rgba(201, 168, 124, 0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(201, 168, 124, 0.4)';
  ctx.font = '9px serif';
  ctx.textAlign = 'center';
  ctx.fillText('MOON', 0, -6);
  ctx.fillText('DUST', 0, 4);
  ctx.restore();

  // 下载
  const link = document.createElement('a');
  link.download = `moondust_${record.title}_${record.date}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split('');
  const lines = [];
  let currentLine = '';

  words.forEach(char => {
    const testLine = currentLine + char;
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && currentLine) {
      lines.push(currentLine);
      currentLine = char;
    } else {
      currentLine = testLine;
    }
  });

  if (currentLine) {
    lines.push(currentLine);
  }

  return lines;
}

// ✨ 优化后的批量导出 - 使用 async/await 和进度提示
async function exportAllCards() {
  const records = getFilteredRecords(); // ✨ 使用筛选后的记录
  if (records.length === 0) {
    alert('暂无符合筛选条件的记录可导出');
    return;
  }

  // 显示加载提示
  const loadingEl = document.createElement('div');
  loadingEl.style.cssText = `
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(10,10,15,0.95); color: rgba(255,255,255,0.9);
    padding: 24px 32px; border-radius: 12px; z-index: 10000;
    font-family: var(--font-serif); font-size: 14px; text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  `;
  loadingEl.innerHTML = `
    <div style="margin-bottom: 12px; color: var(--accent);">◇</div>
    <div>正在导出 <span id="exportProgress">0</span> / ${records.length}</div>
    <div style="margin-top: 8px; font-size: 12px; opacity: 0.6;">请稍候...</div>
  `;
  document.body.appendChild(loadingEl);

  const cardWidth = 600;
  const cardHeight = 400;
  const cols = 2;
  const rows = Math.ceil(records.length / cols);

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { alpha: false });

  // 2倍分辨率
  const scale = 2;
  canvas.width = cols * cardWidth * scale;
  canvas.height = rows * cardHeight * scale;
  ctx.scale(scale, scale);

  // ✨ 深色木质背景
  const bgGradient = ctx.createLinearGradient(0, 0, cols * cardWidth, rows * cardHeight);
  bgGradient.addColorStop(0, '#3a2f26');
  bgGradient.addColorStop(0.5, '#2d2419');
  bgGradient.addColorStop(1, '#3a2f26');
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, cols * cardWidth, rows * cardHeight);

  // 木质纹理噪点
  for (let i = 0; i < cols * rows * 1500; i++) {
    const x = Math.random() * cols * cardWidth;
    const y = Math.random() * rows * cardHeight;
    ctx.fillStyle = `rgba(${Math.random() > 0.5 ? '80,60,40' : '20,15,10'},${Math.random() * 0.12})`;
    ctx.fillRect(x, y, Math.random() * 2, Math.random() * 0.5);
  }

  // 逐个绘制卡片
  for (let index = 0; index < records.length; index++) {
    const record = records[index];
    const col = index % cols;
    const row = Math.floor(index / cols);
    const x = col * cardWidth;
    const y = row * cardHeight;

    // ✨ 纸张区域
    const paperX = x + 50;
    const paperY = y + 25;
    const paperW = 500;
    const paperH = 350;

    // 纸张阴影
    ctx.save();
    ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetX = -2;
    ctx.shadowOffsetY = 2;
    ctx.fillStyle = '#F4F1EA';
    ctx.fillRect(paperX, paperY, paperW, paperH);
    ctx.restore();

    // ✨ 增强纸张纹理（细腻的纤维质感）
    for (let i = 0; i < 800; i++) {
      const px = paperX + Math.random() * paperW;
      const py = paperY + Math.random() * paperH;
      const brightness = Math.random() > 0.5 ? 220 : 200;
      ctx.fillStyle = `rgba(${brightness},${brightness - 20},${brightness - 50},${Math.random() * 0.12})`;
      ctx.fillRect(px, py, Math.random() * 1.5, Math.random() * 0.8);
    }

    // 纸张边缘阴影（增强立体感）
    ctx.fillStyle = 'rgba(180, 160, 140, 0.08)';
    ctx.fillRect(paperX, paperY, paperW, 3);
    ctx.fillRect(paperX, paperY, 3, paperH);

    // ✨ 手帐横线（淡淡的背景线，不干扰阅读）
    ctx.strokeStyle = 'rgba(200, 180, 160, 0.18)'; // 降低不透明度，作为纸张纹理
    ctx.lineWidth = 0.6;
    const lineStart = paperX + 15;
    const lineEnd = paperX + paperW - 15;
    for (let ly = paperY + 40; ly < paperY + paperH - 15; ly += 22) {
      ctx.beginPath();
      ctx.moveTo(lineStart, ly);
      ctx.lineTo(lineEnd, ly);
      ctx.stroke();
    }

    // ✨ Polaroid 风格海报
    if (record.poster) {
      const img = await loadImageWithRetry(record.poster, 1);
      const polaroidX = paperX + 30;
      const polaroidY = paperY + 35;
      const polaroidW = 110;
      const polaroidH = 155;
      const borderW = 8;
      const rotation = (Math.random() * 4 - 2) * Math.PI / 180; // -2 到 2 度随机旋转

      ctx.save();
      ctx.translate(polaroidX + polaroidW / 2, polaroidY + polaroidH / 2);
      ctx.rotate(rotation);

      // Polaroid 白边
      ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 4;
      ctx.fillStyle = '#FEFEFE';
      ctx.fillRect(-polaroidW / 2 - borderW, -polaroidH / 2 - borderW, polaroidW + borderW * 2, polaroidH + borderW * 2.5);

      if (img) {
        ctx.drawImage(img, -polaroidW / 2, -polaroidH / 2, polaroidW, polaroidH);
      } else {
        ctx.fillStyle = '#E8E8E8';
        ctx.fillRect(-polaroidW / 2, -polaroidH / 2, polaroidW, polaroidH);
      }

      ctx.restore();

      // ✨ 纸胶带 (单个角)
      ctx.save();
      ctx.translate(polaroidX + 8, polaroidY - 5);
      ctx.rotate(-12 * Math.PI / 180);
      ctx.fillStyle = 'rgba(240, 230, 200, 0.65)';
      ctx.fillRect(0, 0, 40, 12);
      ctx.strokeStyle = 'rgba(180, 170, 140, 0.25)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(0, 0, 40, 12);
      ctx.restore();
    }

    // ✨ 月份/季节标识（右上角，斜体）
    const monthLabel = getMonthLabel(record.date);
    ctx.save();
    ctx.font = 'italic 13px "Times New Roman", serif';
    ctx.fillStyle = 'rgba(150, 130, 110, 0.5)';
    ctx.textAlign = 'right';
    ctx.fillText(monthLabel, paperX + paperW - 20, paperY + 20);
    ctx.restore();

    drawCardText(ctx, record, x, y, paperX, paperY);

    // 更新进度
    document.getElementById('exportProgress').textContent = index + 1;
  }

  // 获取月份标签（英文）
  function getMonthLabel(dateStr) {
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'];
    const match = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (match) {
      const monthIndex = parseInt(match[2]) - 1;
      const year = match[1];
      return `${months[monthIndex]} ${year}`;
    }
    return dateStr;
  }

  // 下载
  const link = document.createElement('a');
  link.download = `moondust_all_${new Date().toISOString().split('T')[0]}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();

  // 移除加载提示
  document.body.removeChild(loadingEl);

  function drawCardText(ctx, record, x, y, paperX, paperY) {
    ctx.textAlign = 'left';

    // 标题
    ctx.fillStyle = '#4a3f35';
    ctx.font = 'bold 17px serif';
    const title = record.title.length > 16 ? record.title.substring(0, 16) + '...' : record.title;
    ctx.fillText(title, paperX + 170, paperY + 55);

    // 类型和年份
    ctx.fillStyle = '#7a6f65';
    ctx.font = '11px serif';
    const typeText = record.type === 'book' ? '📚 书籍' : record.type === 'tv' ? '📺 剧集' : '🎬 电影';
    ctx.fillText(`${typeText} · ${record.year || ''}`, paperX + 170, paperY + 75);

    // 评分星星
    ctx.fillStyle = '#C9A87C';
    ctx.font = '14px serif';
    ctx.fillText('★'.repeat(record.rating) + '☆'.repeat(5 - record.rating), paperX + 170, paperY + 98);

    // 日期
    ctx.fillStyle = '#9a8f85';
    ctx.font = '10px serif';
    ctx.fillText(`📅 ${record.date}`, paperX + 170, paperY + 117);

    // 评论内容
    if (record.comment) {
      ctx.fillStyle = '#5a5045';
      ctx.font = '11px serif';
      const maxWidth = 280;
      const lineHeight = 22;
      const lines = wrapText(ctx, record.comment, maxWidth);

      lines.forEach((line, i) => {
        if (i < 5) {
          ctx.fillText(line, paperX + 170, paperY + 140 + i * lineHeight);
        }
      });
    } else {
      ctx.fillStyle = 'rgba(90, 80, 70, 0.35)';
      ctx.font = 'italic 11px serif';
      ctx.fillText('— 此人尚未留下隻字片語 —', paperX + 170, paperY + 140);
    }

    // ✨ 复古水印印章
    ctx.save();
    ctx.translate(paperX + 460, paperY + 320);
    ctx.rotate(-8 * Math.PI / 180);
    ctx.strokeStyle = 'rgba(201, 168, 124, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(201, 168, 124, 0.35)';
    ctx.font = '7px serif';
    ctx.textAlign = 'center';
    ctx.fillText('MOON', 0, -4);
    ctx.fillText('DUST', 0, 3);
    ctx.restore();
  }
}

function initModalCloseEvents() {

  document.getElementById('detailModalClose').onclick = closeDetailModal;

        !document.getElementById('detailModal').classList.contains('active')) {

    }
  };
  document.onkeydown = e => {
    if (e.key === 'Escape') {

}

function updateStarRating(rating) {
  State.selectedRating = rating;
  document.querySelectorAll('#reviewRating .star').forEach((s, i) => {
    s.classList.toggle('active', i < rating);
  });
}

function initStarRating() {
  document.querySelectorAll('#reviewRating .star').forEach(star => {
    star.onclick = () => {
      updateStarRating(parseInt(star.dataset.rating));
      Haptics.light(); // ✨ 评分时轻微震动
    };
    star.onmouseenter = () => {
      const r = parseInt(star.dataset.rating);
      document.querySelectorAll('#reviewRating .star').forEach((s, i) => {
        s.style.color = i < r ? 'var(--accent)' : 'rgba(255,255,255,0.2)';
      });
    };
  });
  document.getElementById('reviewRating').onmouseleave = () => updateStarRating(State.selectedRating);
}

function saveRecord(withComment) {
  const title = document.getElementById('reviewItemTitle').value.trim() || '未知作品';
  const year = document.getElementById('reviewItemYear').value.trim() || '';
  const poster = State.customPoster || State.selectedItem?.poster || '';

  if (State.editingId) {
    const records = Storage.getRecords();
    const idx = records.findIndex(r => r.id === State.editingId);
    if (idx !== -1) {
      records[idx] = {
        ...records[idx],
        title, year, poster,
        rating: State.selectedRating,
        comment: withComment ? document.getElementById('reviewTextarea').value.trim() : records[idx].comment,
        updatedAt: Date.now()
      };
      Storage.saveRecords(records);
    }
    State.editingId = null;
  } else {
    const record = {
      id: Storage.generateId(),
      type: State.selectedItem?.type || State.currentType,
      title, year, poster,
      date: new Date().toISOString().split('T')[0],
      rating: State.selectedRating,
      comment: withComment ? document.getElementById('reviewTextarea').value.trim() : '',
      createdAt: Date.now()
    };
    Storage.addRecord(record);
  }

  hideModalLayer();
  document.getElementById('searchInput').value = '';
  updateLibraryCount();
  Haptics.success(); // ✨ 保存成功震动反馈
}

function initReviewActions() {
  document.getElementById('abandonBtn').onclick = hideModalLayer;
  document.getElementById('saveLaterBtn').onclick = () => saveRecord(false);
  document.getElementById('saveNowBtn').onclick = () => saveRecord(true);
}

function openLibraryModal() {
  showModalLayer();
  document.getElementById('libraryModal').classList.add('active');
  renderLibrary();
}

function closeLibraryModal() {
  document.getElementById('libraryModal').classList.remove('active');
  document.getElementById('modalLayer').classList.remove('active');
}

function initLibraryButton() {
  document.getElementById('openLibraryBtn').onclick = () => {
    openLibraryModal();
    // 显示筛选栏
    document.getElementById('libraryFilterBar').style.display = 'block';
  };
}

function updateLibraryCount() {

  document.getElementById('libraryCount').textContent = count;

// ✨ 初始化库存筛选功能
function initLibraryFilters() {
  const searchInput = document.getElementById('librarySearchInput');
  const clearBtn = document.getElementById('clearSearchBtn');

  // 搜索框输入
  searchInput.addEventListener('input', (e) => {
    State.libraryFilter.searchQuery = e.target.value.trim();
    clearBtn.style.display = e.target.value ? 'block' : 'none';
    renderLibrary();
  });

  // 清除搜索
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    State.libraryFilter.searchQuery = '';
    clearBtn.style.display = 'none';
    renderLibrary();
  });

  // 类型筛选chips
  document.querySelectorAll('[data-filter-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter-type]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      State.libraryFilter.type = btn.dataset.filterType;
      renderLibrary();
    });
  });

  // 评分筛选chips
  document.querySelectorAll('[data-filter-rating]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter-rating]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      State.libraryFilter.rating = parseInt(btn.dataset.filterRating);
      renderLibrary();
    });

}

function initViewToggle() {
  const btn = document.getElementById('viewToggleBtn');
  btn.onclick = () => {
    State.viewMode = State.viewMode === 'grid' ? 'list' : 'grid';
    localStorage.setItem('moondust_view', State.viewMode);
    document.body.dataset.view = State.viewMode;
    btn.querySelector('.view-icon').textContent = State.viewMode === 'grid' ? '⊞' : '☰';
    if (document.getElementById('libraryModal').classList.contains('active')) {
      renderLibrary();
    }
  };
  btn.querySelector('.view-icon').textContent = State.viewMode === 'grid' ? '⊞' : '☰';
}

function initParticleToggle() {
  const btn = document.getElementById('particleToggleBtn');
  btn.onclick = () => {
    State.particleEnabled = !State.particleEnabled;
    localStorage.setItem('moondust_particle', State.particleEnabled);
    document.body.dataset.particle = State.particleEnabled;
    btn.classList.toggle('active', State.particleEnabled);
  };
  btn.classList.toggle('active', State.particleEnabled);
}

function groupRecords(records) {
  const monthMap = {};

  records.forEach(r => {
    const d = new Date(r.date);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!monthMap[key]) {
      monthMap[key] = { year: d.getFullYear(), month: d.getMonth(), items: [] };
    }
    monthMap[key].items.push(r);
  });

  const sorted = Object.values(monthMap).sort((a, b) => {
    if (a.year !== b.year) return b.year - a.year;
    return b.month - a.month;
  });

  const groups = [];
  let buffer = [];

  sorted.forEach(g => {
    if (g.items.length >= 3) {
      if (buffer.length > 0) {
        groups.push(...mergeToSeasons(buffer));
        buffer = [];
      }
      groups.push({
        label: `${getMonthName(g.month)} ${g.year}`,
        items: g.items
      });
    } else {
      buffer.push(g);
    }
  });

  if (buffer.length > 0) {
    groups.push(...mergeToSeasons(buffer));
  }

  return groups;
}

function mergeToSeasons(monthGroups) {
  if (monthGroups.length === 0) return [];

  const seasonMap = {};
  monthGroups.forEach(g => {
    const season = getSeason(new Date(g.year, g.month));
    if (!seasonMap[season]) {
      seasonMap[season] = { season, year: g.year, items: [] };
    }
    seasonMap[season].items.push(...g.items);
  });

  return Object.values(seasonMap).map(s => ({
    label: `${getSeasonName(s.season)} ${s.year}`,
    items: s.items
  }));
}

// ✨ 获取筛选后的记录（供图书馆和导出功能共用）
function getFilteredRecords() {
  let records = Storage.getRecords();
  const filter = State.libraryFilter;

  // 类型筛选
  if (filter.type !== 'all') {
    records = records.filter(r => r.type === filter.type);
  }

  // 评分筛选
  if (filter.rating > 0) {
    records = records.filter(r => r.rating >= filter.rating);
  }

  // 搜索关键词筛选 (标题 + 评论)
  if (filter.searchQuery) {
    const query = filter.searchQuery.toLowerCase();
    records = records.filter(r => {
      const titleMatch = r.title.toLowerCase().includes(query);
      const commentMatch = r.comment && r.comment.toLowerCase().includes(query);
      return titleMatch || commentMatch;
    });
  }

  return records;
}

function renderLibrary() {
  const records = getFilteredRecords(); // ✨ 使用统一的筛选函数
  const body = document.getElementById('libraryModalBody');
  const count = document.getElementById('libraryRecordCount');

  const allRecords = Storage.getRecords();
  count.textContent = records.length === allRecords.length
    ? `${records.length} 条记录`
    : `${records.length} / ${allRecords.length} 条记录`;

  if (records.length === 0) {
    body.innerHTML = `
      <div class="library-empty">
        <div class="library-empty-icon">◇</div>
        <p class="library-empty-text">${allRecords.length === 0 ? '尚未记录任何内容' : '没有符合条件的记录'}</p>
      </div>
    `;
    return;
  }

  const groups = groupRecords(records);
  const season = getSeason();

  body.innerHTML = groups.map(group => `
    <div class="library-group" data-season="${season}">
      <h4 class="library-group-title">${group.label}</h4>
      <div class="library-records-${State.viewMode}">
        ${group.items.map(r => renderRecordCard(r)).join('')}
      </div>
    </div>
  `).join('');

  body.querySelectorAll('.library-record').forEach(el => {
    el.style.cursor = 'pointer';
    el.onclick = () => {
      const id = el.dataset.id;
      const record = Storage.getRecords().find(r => r.id === id);
      if (record) openDetailModal(record);
    };
  });

  // ✨ 使用 IntersectionObserver 实现粒子动画的惰性加载
  if (State.particleEnabled) {
    const particleObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const canvas = entry.target.querySelector('.record-particle-canvas');
        const comment = entry.target.querySelector('.record-comment');

        if (entry.isIntersecting && canvas && comment) {
          // 进入视口时初始化粒子
          initParticleForRecord(canvas, comment);
        } else if (canvas) {
          // 离开视口时暂停动画
          const instance = particleInstances.get(canvas);
          if (instance) instance.pause();
        }
      });
    }, {
      rootMargin: '100px', // 提前 100px 开始加载
      threshold: 0.1
    });

    body.querySelectorAll('.record-particle-wrapper').forEach(el => {
      particleObserver.observe(el);
    });
  }
}

function renderRecordCard(record) {
  const poster = record.poster
    ? `<img src="${record.poster}" alt="${record.title}" class="library-record-poster" loading="lazy">`
    : `<div class="library-record-poster" style="display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);font-size:10px;color:rgba(255,255,255,0.3)">无封面</div>`;

  const rating = '<span>★</span>'.repeat(record.rating) + '<span class="empty">★</span>'.repeat(5 - record.rating);
  const comment = record.comment || '此人尚未留下隻字片語。';

  if (State.viewMode === 'grid') {
    return `
      <div class="library-record library-record-grid" data-id="${record.id}">
        ${poster}
        <div class="library-record-info" style="padding:8px">
          <p class="library-record-title">${record.title}</p>
          <p class="library-record-meta">${record.year || ''}</p>
        </div>
        <div class="record-particle-wrapper" style="height:60px">
          <div class="record-comment">${comment}</div>
          <canvas class="record-particle-canvas"></canvas>
          <div class="record-particle-bg"></div>
        </div>
      </div>
    `;
  }

  return `
    <div class="library-record library-record-list" data-id="${record.id}">
      ${poster}
      <div class="library-record-info">
        <p class="library-record-title">${record.title}</p>
        <p class="library-record-meta">${record.type === 'book' ? '书籍' : record.type === 'tv' ? '剧集' : '电影'} · ${record.year || ''}</p>
        <div class="library-record-rating">${rating}</div>
        <div class="record-particle-wrapper" style="margin-top:8px">
          <div class="record-comment ${record.comment ? '' : 'empty'}">${comment}</div>
          <canvas class="record-particle-canvas"></canvas>
          <div class="record-particle-bg"></div>
        </div>
      </div>
    </div>
  `;
}

const particleInstances = new Map();

// ✨ 性能检测 - 自动降低粒子密度
function getDevicePerformance() {
  const memory = navigator.deviceMemory || 4; // GB
  const cores = navigator.hardwareConcurrency || 4;

  if (memory < 4 || cores < 4) {
    return 'low'; // 低性能设备
  } else if (memory < 8 || cores < 8) {
    return 'medium'; // 中等性能
  }
  return 'high'; // 高性能
}

function initParticleForRecord(canvas, commentEl) {
  if (particleInstances.has(canvas)) return;

  const wrapper = canvas.parentElement;
  const width = wrapper.offsetWidth;
  const height = wrapper.offsetHeight;

  canvas.width = width;
  canvas.height = height;

  const area = width * height;

  // 根据设备性能调整粒子密度
  const performance = getDevicePerformance();
  const densityMultiplier = {
    low: 0.5,    // 低性能设备减少 50% 粒子
    medium: 0.75, // 中等性能减少 25%
    high: 1.0     // 高性能使用默认密度
  };

  const count = Math.floor((area / 8000) * CONFIG.PARTICLE_DENSITY * densityMultiplier[performance]);

  const particles = [];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * width,
      y: Math.random() * height,
      baseX: 0, baseY: 0,
      vx: 0, vy: 0,
      size: Math.random() * CONFIG.PARTICLE_SIZE + 0.5,
      opacity: Math.random() * 0.25 + 0.05
    });
    particles[i].baseX = particles[i].x;
    particles[i].baseY = particles[i].y;
  }

  let isRevealed = false;
  let exploding = false;
  let gathering = false;
  let animationId = null;
  let isPaused = false;

  const ctx = canvas.getContext('2d');

  function draw() {
    if (isPaused) return;

    ctx.clearRect(0, 0, width, height);

    if (!isRevealed) {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.97)';
      ctx.fillRect(0, 0, width, height);

      particles.forEach(p => {
        if (!gathering) {
          p.vx += (Math.random() - 0.5) * 0.08;
          p.vy += (Math.random() - 0.5) * 0.08;
          p.vx *= 0.96;
          p.vy *= 0.96;
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 2) p.vx += 0.1;
          if (p.x > width - 2) p.vx -= 0.1;
          if (p.y < 2) p.vy += 0.1;
          if (p.y > height - 2) p.vy -= 0.1;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 168, 124, ${p.opacity})`;
        ctx.fill();
      });
    }

    animationId = requestAnimationFrame(draw);
  }

  draw();

  function explode() {
    if (exploding || isRevealed) return;
    exploding = true;

    particles.forEach(p => {
      const dx = p.x - width / 2;
      const dy = p.y - height / 2;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const speed = 6 + Math.random() * 10;
      p.vx = (dx / dist) * speed;
      p.vy = (dy / dist) * speed;
    });

    setTimeout(() => {
      isRevealed = true;
      exploding = false;
    }, 600);
  }

  function gather() {
    if (gathering || !isRevealed) return;
    gathering = true;

    particles.forEach(p => {
      p.vx = (p.baseX - p.x) * 0.15;
      p.vy = (p.baseY - p.y) * 0.15;
      p.opacity = 0;
    });

    const animate = () => {
      let done = true;
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.88;
        p.vy *= 0.88;
        if (Math.abs(p.baseX - p.x) > 1 || Math.abs(p.baseY - p.y) > 1) done = false;
        p.opacity = Math.min(0.3, p.opacity + 0.03);
      });
      if (!done) requestAnimationFrame(animate);
      else {
        gathering = false;
        isRevealed = false;
      }
    };
    animate();
  }

  const handleClick = (e) => {
    e.stopPropagation();
    if (isRevealed) {
      gather();
      Haptics.light(); // ✨ 收拢时轻微震动
    } else {
      explode();
      Haptics.heavy(); // ✨ 爆炸时强烈震动
    }
  };

  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('touchend', handleClick);

  // ✨ 暂停和恢复功能
  const pause = () => {
    isPaused = true;
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  };

  const resume = () => {
    if (!isPaused) return;
    isPaused = false;
    draw();
  };

  particleInstances.set(canvas, { explode, gather, pause, resume });
}

function displayRandomQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  const qEl = document.getElementById('mainQuote');
  const aEl = document.getElementById('quoteAuthor');

  qEl.style.opacity = '0';
  aEl.style.opacity = '0';

  setTimeout(() => {
    qEl.textContent = `"${q.text}"`;
    aEl.textContent = `— ${q.author}`;
    qEl.style.transition = 'opacity 1.5s ease';
    aEl.style.transition = 'opacity 1.5s ease 0.3s';
    qEl.style.opacity = '1';
    aEl.style.opacity = '0.6';
  }, 100);
}
