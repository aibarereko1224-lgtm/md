<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moon Dust 月岩尘 | 影音阅读记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@300;400;500&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◇</text></svg>">
  <meta name="description" content="Moon Dust - 一个诗意的影音阅读记录应用">
  <style>
/* CSS Variables */
:root {
  --bg-primary: #121212;
  --surface: rgba(255, 255, 255, 0.03);
  --surface-hover: rgba(255, 255, 255, 0.06);
  --text-primary: #E8E8E8;
  --text-secondary: #8A8A8A;
  --accent: #C9A87C;

  --glass-bg: rgba(20, 20, 28, 0.65);
  --glass-border: rgba(255, 255, 255, 0.1);

  --font-serif: 'Noto Serif SC', 'PT Serif', Georgia, serif;
  --font-display: 'Playfair Display', Georgia, serif;

  --transition-fast: 0.2s ease;
  --transition-medium: 0.4s cubic-bezier(0.16, 1, 0.3, 1);

  --z-modal: 1000;
  --z-buttons: 1010;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  min-height: 100vh;
  font-family: var(--font-serif);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

.noise-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9998;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

.scene-backgrounds {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
}

.scene-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s ease;
  pointer-events: none;
  background-size: cover;
  background-position: center;
}

.scene-bg.active {
  opacity: 1;
}

.scene-bg[data-scene="forest"] {
  background-image: linear-gradient(160deg, rgba(13, 31, 18, 0.85), rgba(26, 58, 31, 0.7), rgba(45, 90, 61, 0.6)), url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80');
}

.scene-bg[data-scene="starry"] {
  background-image: linear-gradient(180deg, rgba(5, 5, 16, 0.7), rgba(10, 10, 32, 0.6), rgba(15, 15, 37, 0.5)), url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920&q=80');
}

.stars-layer {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(1px 1px at 5% 10%, rgba(255, 255, 255, 0.8), transparent),
    radial-gradient(1px 1px at 15% 25%, rgba(255, 255, 255, 0.6), transparent),
    radial-gradient(2px 2px at 25% 5%, rgba(255, 255, 255, 0.9), transparent),
    radial-gradient(1px 1px at 35% 35%, rgba(255, 255, 255, 0.5), transparent),
    radial-gradient(1px 1px at 45% 15%, rgba(255, 255, 255, 0.7), transparent),
    radial-gradient(2px 2px at 55% 45%, rgba(255, 255, 255, 0.4), transparent),
    radial-gradient(1px 1px at 65% 25%, rgba(255, 255, 255, 0.8), transparent),
    radial-gradient(1px 1px at 75% 55%, rgba(255, 255, 255, 0.6), transparent),
    radial-gradient(2px 2px at 85% 35%, rgba(255, 255, 255, 0.5), transparent),
    radial-gradient(1px 1px at 95% 65%, rgba(255, 255, 255, 0.7), transparent);
}

.twinkling-stars {
  position: absolute;
  width: 100%;
  height: 100%;
  animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.scene-bg[data-scene="stream"] {
  background-image: linear-gradient(180deg, rgba(10, 21, 32, 0.75), rgba(21, 37, 53, 0.65), rgba(26, 53, 69, 0.55)), url('https://images.unsplash.com/photo-1501756741507-18b76cd29a65?w=1920&q=80');
}

.scene-bg[data-scene="desert"] {
  background-image: linear-gradient(180deg, rgba(26, 26, 26, 0.8), rgba(42, 37, 32, 0.7), rgba(58, 48, 37, 0.6)), url('https://images.unsplash.com/photo-1509316785289-025f3ee8679a?w=1920&q=80');
}

.main-container {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 32px 20px;
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.app-title {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: 0.4em;
  color: var(--text-secondary);
  opacity: 0.6;
}

.header-right {
  display: flex;
  gap: 8px;
}

.scene-btn {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 6px;
  padding: 8px 14px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.scene-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.3);
  color: rgba(255, 255, 255, 0.9);
}

.scene-btn.active {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.4);
  color: #ffffff;
}

.quote-section {
  text-align: center;
  padding: 40px 0;
  opacity: 0;
  animation: fadeInUp 0.8s ease forwards;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
  from { opacity: 0; transform: translateY(20px); }
}

.quote-content {
  margin-bottom: 40px;
}

.main-quote {
  font-family: var(--font-serif);
  font-size: clamp(16px, 4vw, 24px);
  font-weight: 400;
  letter-spacing: 0.03em;
  line-height: 1.6;
  color: #ffffff;
  margin-bottom: 12px;
  text-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 60px rgba(0, 0, 0, 0.6);
}

.quote-author {
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: rgba(255, 255, 255, 0.6);
  opacity: 0;
}

.quote-divider {
  width: 50px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201, 168, 124, 0.6), transparent);
  margin: 20px auto 0;
}

.entry-container {
  max-width: 480px;
  margin: 0 auto 40px;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.2s forwards;
}

.glass-card {
  background: rgba(10, 10, 15, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 20px;
}

.type-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.type-btn {
  flex: 1;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.type-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 255, 255, 0.8);
}

.type-btn.active {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.35);
  color: #ffffff;
}

.search-wrapper {
  display: flex;
  gap: 8px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  padding: 4px;
}

.search-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px 14px;
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
}

.search-input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.search-btn {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 6px;
  padding: 10px 18px;
  font-family: var(--font-display);
  font-size: 12px;
  color: rgba(255, 255, 255, 0.7);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.search-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.4);
  color: #ffffff;
}

.library-entrance {
  text-align: center;
  padding: 20px 0;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.4s forwards;
}

.library-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 30px;
  padding: 14px 28px;
  cursor: pointer;
  transition: all var(--transition-medium);
}

.library-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(201, 168, 124, 0.5);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
}

.library-btn-icon {
  font-size: 18px;
  color: var(--accent);
}

.library-btn-text {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.8);
}

.library-btn-count {
  background: var(--accent);
  color: #0a0a0f;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
}

.modal-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: var(--z-modal);
  display: none;
  pointer-events: none;
}

.modal-layer.active {
  display: block;
  pointer-events: auto;
}

.modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.glass-panel {
  position: absolute;
  background: rgba(15, 15, 20, 0.92);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
  z-index: var(--z-modal);
  opacity: 0;
  visibility: hidden;
  transform: scale(0.95) translateY(20px);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.glass-panel.active {
  opacity: 1;
  visibility: visible;
  transform: scale(1) translateY(0);
}

.poster-modal {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: min(92vw, 800px);
  max-height: 85vh;
  overflow: hidden;
}

.poster-modal.active {
  transform: translate(-50%, -50%) scale(1);
}

.poster-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.poster-modal-title {
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.8);
}

.poster-modal-body {
  padding: 16px 20px;
  max-height: calc(85vh - 80px);
  overflow-y: auto;
}

.poster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 12px;
}

.poster-item {
  position: relative;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 2/3;
  transition: all var(--transition-medium);
}

.poster-item:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.poster-item:hover::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid rgba(201, 168, 124, 0.6);
  border-radius: 8px;
}

.poster-item-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: rgba(255, 255, 255, 0.05);
}

.poster-placeholder {
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: rgba(255, 255, 255, 0.3);
}

.poster-item-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px 6px;
  background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.poster-item:hover .poster-item-info {
  opacity: 1;
}

.poster-item-title {
  font-size: 10px;
  color: #fff;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.poster-upload-option {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

.upload-own-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px dashed rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  padding: 16px;
  font-family: var(--font-display);
  font-size: 13px;
  color: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.upload-own-btn:hover {
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(201, 168, 124, 0.4);
  color: rgba(255, 255, 255, 0.8);
}

.upload-own-icon {
  font-size: 18px;
}

.poster-modal.loading .poster-modal-body {
  opacity: 0.3;
}

.poster-modal.loading .poster-modal-loading {
  display: flex;
}

.poster-modal-loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.loading-spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-top-color: rgba(201, 168, 124, 0.8);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.poster-modal-loading span {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
}

.review-modal {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: min(94vw, 700px);
  max-height: 90vh;
  overflow: hidden;
}

.review-modal.active {
  transform: translate(-50%, -50%) scale(1);
}

.review-modal-content {
  display: flex;
  min-height: 400px;
}

.review-poster-section {
  width: 180px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.review-poster-img {
  width: 100%;
  flex: 1;
  object-fit: cover;
  border-radius: 16px 0 0 16px;
  min-height: 280px;
  background: rgba(255, 255, 255, 0.05);
}

.upload-poster-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px dashed rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.upload-poster-btn:hover {
  background: rgba(0, 0, 0, 0.6);
  border-color: rgba(201, 168, 124, 0.5);
}

.upload-icon {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.5);
}

.upload-text {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
}

.review-form-section {
  flex: 1;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
}

.review-title-input,
.review-year-input {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--text-primary);
  outline: none;
  margin-bottom: 12px;
}

.review-title-input {
  font-size: 18px;
  font-weight: 500;
}

.review-year-input {
  font-size: 13px;
  color: var(--text-secondary);
}

.review-title-input::placeholder,
.review-year-input::placeholder {
  color: rgba(255, 255, 255, 0.3);
}

.review-rating-section {
  margin-bottom: 16px;
}

.star-rating {
  display: flex;
  gap: 2px;
}

.star-rating .star {
  font-size: 22px;
  cursor: pointer;
  color: rgba(255, 255, 255, 0.2);
  transition: all 0.15s ease;
}

.star-rating .star:hover,
.star-rating .star.active {
  color: var(--accent);
  transform: scale(1.15);
}

.review-textarea-section {
  flex: 1;
  margin-bottom: 16px;
}

.review-textarea {
  width: 100%;
  height: 100%;
  min-height: 100px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: var(--font-serif);
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-primary);
  resize: none;
  outline: none;
}

.review-textarea::placeholder {
  color: rgba(255, 255, 255, 0.3);
}

.review-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  position: relative;
  z-index: var(--z-buttons);
}

.review-action-btn {
  padding: 12px 18px;
  border-radius: 8px;
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  z-index: var(--z-buttons);
  pointer-events: auto;
}

.review-action-btn.abandon {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: rgba(255, 255, 255, 0.5);
}

.review-action-btn.abandon:hover {
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 255, 255, 0.8);
}

.review-action-btn.save-later {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: rgba(255, 255, 255, 0.7);
}

.review-action-btn.save-later:hover {
  background: rgba(255, 255, 255, 0.08);
  color: #ffffff;
}

.review-action-btn.root-btn {
  background: rgba(201, 168, 124, 0.9);
  border: 1px solid var(--accent);
  color: #0a0a0f;
  font-weight: 500;
}

.review-action-btn.root-btn:hover {
  background: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201, 168, 124, 0.4);
}

.modal-close-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  transition: all var(--transition-fast);
  z-index: var(--z-buttons);
}

.modal-close-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  color: #ffffff;
}

.review-close-btn {
  top: 16px;
  right: 16px;
}

.library-modal {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: min(95vw, 1100px);
  max-height: 88vh;
  overflow: hidden;
}

.library-modal.active {
  transform: translate(-50%, -50%) scale(1);
}

.library-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.library-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.library-modal-title {
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.9);
}

.library-record-count {
  font-size: 12px;
  color: var(--text-secondary);
}

.library-header-right {
  display: flex;

const Storage = {
  getRecords() {
    try {
      return JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY)) || [];
    } catch { return []; }
  },
  saveRecords(records) {
    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(records));
  },
  addRecord(record) {
    const records = this.getRecords();
    records.unshift(record);
    this.saveRecords(records);
    return records;
  },
  generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2);
  }
};

function getSeason(date = new Date()) {
  const month = date.getMonth();
  if (month >= 2 && month <= 4) return 'spring';
  if (month >= 5 && month <= 7) return 'summer';
  if (month >= 8 && month <= 10) return 'autumn';
  return 'winter';
}

function getSeasonName(season) {
  return { spring: 'Spring', summer: 'Summer', autumn: 'Autumn', winter: 'Winter' }[season];
}

function getMonthName(month) {
  return ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][month];
}

const TMDBService = {
  async searchMovies(query) {
    const res = await fetch(`${CONFIG.TMDB_BASE_URL}/search/movie?api_key=${CONFIG.TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=zh-TW`);
    const data = await res.json();
    return data.results || [];
  },
  async searchTV(query) {
    const res = await fetch(`${CONFIG.TMDB_BASE_URL}/search/tv?api_key=${CONFIG.TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=zh-TW`);
    const data = await res.json();
    return data.results || [];
  },
  getPosterUrl(path) {
    return path ? CONFIG.TMDB_IMAGE_BASE + path : null;
  }
};

const GoogleBooksService = {
  async search(query) {
    const res = await fetch(`${CONFIG.GOOGLE_BOOKS_URL}?q=${encodeURIComponent(query)}&maxResults=20`);
    const data = await res.json();
    return data.items || [];
  },
  getCoverUrl(info) {
    return info?.imageLinks?.thumbnail || info?.imageLinks?.smallThumbnail || null;
  }
};

async function performSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  showPosterModal();
  showLoading();

  try {
    let results = [];
    if (State.currentType === 'book') {
      const items = await GoogleBooksService.search(query);
      results = items.map(i => ({
        id: i.id, type: 'book', title: i.volumeInfo.title || 'Unknown',
        year: i.volumeInfo.publishedDate?.substr(0, 4) || '',
        poster: GoogleBooksService.getCoverUrl(i.volumeInfo)
      }));
    } else if (State.currentType === 'movie') {
      const movies = await TMDBService.searchMovies(query);
      results = movies.map(m => ({
        id: String(m.id), type: 'movie', title: m.title || 'Unknown',
        year: (m.release_date || '').substr(0, 4),
        poster: TMDBService.getPosterUrl(m.poster_path)
      }));
    } else {
      const shows = await TMDBService.searchTV(query);
      results = shows.map(s => ({
        id: String(s.id), type: 'tv', title: s.name || 'Unknown',
        year: (s.first_air_date || '').substr(0, 4),
        poster: TMDBService.getPosterUrl(s.poster_path)
      }));
    }
    State.searchResults = results;
    hideLoading();
    renderPosterGrid(results);
  } catch {
    hideLoading();
    renderPosterGrid([]);
  }
}

  document.getElementById('searchBtn').onclick = performSearch;

async function exportCard() {
  if (!currentDetailRecord) return;

  const record = currentDetailRecord;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 600;
  canvas.height = 400;

  ctx.fillStyle = '#121212';
  ctx.fillRect(0, 0, 600, 400);

  for (let i = 0; i < 8000; i++) {
    const x = Math.random() * 600;
    const y = Math.random() * 400;
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.02})`;
    ctx.fillRect(x, y, 1, 1);
  }

  ctx.strokeStyle = 'rgba(201, 168, 124, 0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 20, 560, 360);

  if (record.poster) {
    try {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = record.poster;
      });
      ctx.drawImage(img, 40, 40, 160, 240);
    } catch {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fillRect(40, 40, 160, 240);
    }
  }

  ctx.fillStyle = '#C9A87C';
  ctx.font = 'bold 24px serif';
  const title = record.title.length > 12 ? record.title.substring(0, 12) + '...' : record.title;
  ctx.fillText(title, 220, 80);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '14px serif';
  const typeText = record.type === 'book' ? '书籍' : record.type === 'tv' ? '剧集' : '电影';
  ctx.fillText(`${typeText} · ${record.year || ''}`, 220, 110);

  ctx.fillStyle = '#C9A87C';
  ctx.font = '18px serif';
  ctx.fillText('★'.repeat(record.rating) + '☆'.repeat(5 - record.rating), 220, 145);

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '12px serif';
  ctx.fillText(record.date, 220, 170);

  ctx.strokeStyle = 'rgba(201, 168, 124, 0.2)';
  ctx.beginPath();
  ctx.moveTo(220, 190);
  ctx.lineTo(560, 190);
  ctx.stroke();

  if (record.comment) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '14px serif';
    const maxWidth = 320;
    const lineHeight = 22;
    const lines = wrapText(ctx, record.comment, maxWidth);

    lines.forEach((line, i) => {
      if (i < 6) {
        ctx.fillText(line, 220, 220 + i * lineHeight);
      }
    });
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = 'italic 14px serif';
    ctx.fillText('此人尚未留下隻字片語。', 220, 220);
  }

  ctx.fillStyle = 'rgba(201, 168, 124, 0.5)';
  ctx.font = '10px serif';
  ctx.fillText('MOON DUST', 40, 370);

  const link = document.createElement('a');
  link.download = `${record.title}_${record.date}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split('');
  const lines = [];
  let currentLine = '';

  words.forEach(char => {
    const testLine = currentLine + char;
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && currentLine) {
      lines.push(currentLine);
      currentLine = char;
    } else {
      currentLine = testLine;
    }
  });

  if (currentLine) {
    lines.push(currentLine);
  }

  return lines;
}

function exportAllCards() {
  const records = Storage.getRecords();
  if (records.length === 0) {
    alert('暂无记录可导出');
    return;
  }

  const cardWidth = 600;
  const cardHeight = 400;
  const cols = 2;
  const rows = Math.ceil(records.length / cols);

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = cols * cardWidth;
  canvas.height = rows * cardHeight;

  ctx.fillStyle = '#121212';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let loadedCount = 0;
  records.forEach((record, index) => {
    const col = index % cols;
    const row = Math.floor(index / cols);
    const x = col * cardWidth;
    const y = row * cardHeight;

    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 10, y + 10, cardWidth - 20, cardHeight - 20);
    ctx.strokeStyle = 'rgba(201, 168, 124, 0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 10, y + 10, cardWidth - 20, cardHeight - 20);

    if (record.poster) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        ctx.drawImage(img, x + 30, y + 30, 120, 180);
        drawCardText(ctx, record, x, y);
        loadedCount++;
        if (loadedCount === records.length) {
          downloadCanvas(canvas);
        }
      };
      img.onerror = () => {
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(x + 30, y + 30, 120, 180);
        drawCardText(ctx, record, x, y);
        loadedCount++;
        if (loadedCount === records.length) {
          downloadCanvas(canvas);
        }
      };
      img.src = record.poster;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fillRect(x + 30, y + 30, 120, 180);
      drawCardText(ctx, record, x, y);
      loadedCount++;
      if (loadedCount === records.length) {
        downloadCanvas(canvas);
      }
    }
  });

  function drawCardText(ctx, record, x, y) {
    ctx.fillStyle = '#C9A87C';
    ctx.font = 'bold 18px serif';
    const title = record.title.length > 14 ? record.title.substring(0, 14) + '...' : record.title;
    ctx.fillText(title, x + 170, y + 60);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px serif';
    const typeText = record.type === 'book' ? '书籍' : record.type === 'tv' ? '剧集' : '电影';
    ctx.fillText(`${typeText} · ${record.year || ''}`, x + 170, y + 85);

    ctx.fillStyle = '#C9A87C';
    ctx.font = '14px serif';
    ctx.fillText('★'.repeat(record.rating) + '☆'.repeat(5 - record.rating), x + 170, y + 110);

    if (record.comment) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '12px serif';
      const comment = record.comment.length > 60 ? record.comment.substring(0, 60) + '...' : record.comment;
      ctx.fillText(comment, x + 170, y + 140);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = 'italic 12px serif';
      ctx.fillText('此人尚未留下隻字片語。', x + 170, y + 140);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px serif';
    ctx.fillText(record.date, x + 170, y + 160);

    ctx.fillStyle = 'rgba(201, 168, 124, 0.5)';
    ctx.font = '8px serif';
    ctx.fillText('MOON DUST', x + 30, y + 220);
  }

  function downloadCanvas(canvas) {
    const link = document.createElement('a');
    link.download = `moondust_records_${new Date().toISOString().split('T')[0]}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
}

function groupRecords(records) {
  const monthMap = {};

  records.forEach(r => {
    const d = new Date(r.date);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!monthMap[key]) {
      monthMap[key] = { year: d.getFullYear(), month: d.getMonth(), items: [] };
    }
    monthMap[key].items.push(r);
  });

  const sorted = Object.values(monthMap).sort((a, b) => {
    if (a.year !== b.year) return b.year - a.year;
    return b.month - a.month;
  });

  const groups = [];
  let buffer = [];

  sorted.forEach(g => {
    if (g.items.length >= 3) {
      if (buffer.length > 0) {
        groups.push(...mergeToSeasons(buffer));
        buffer = [];
      }
      groups.push({
        label: `${getMonthName(g.month)} ${g.year}`,
        items: g.items
      });
    } else {
      buffer.push(g);
    }
  });

  if (buffer.length > 0) {
    groups.push(...mergeToSeasons(buffer));
  }

  return groups;
}

function mergeToSeasons(monthGroups) {
  if (monthGroups.length === 0) return [];

  const seasonMap = {};
  monthGroups.forEach(g => {
    const season = getSeason(new Date(g.year, g.month));
    if (!seasonMap[season]) {
      seasonMap[season] = { season, year: g.year, items: [] };
    }
    seasonMap[season].items.push(...g.items);
  });

  return Object.values(seasonMap).map(s => ({
    label: `${getSeasonName(s.season)} ${s.year}`,
    items: s.items
  }));
}

    : `<div class="library-record-poster" style="display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);font-size:10px;color:rgba(255,255,255,0.3)">无封面</div>`;

  const rating = '<span>★</span>'.repeat(record.rating) + '<span class="empty">★</span>'.repeat(5 - record.rating);
  const comment = record.comment || '此人尚未留下隻字片語。';

  if (State.viewMode === 'grid') {
    return `
      <div class="library-record library-record-grid" data-id="${record.id}">
        ${poster}
        <div class="library-record-info" style="padding:8px">
          <p class="library-record-title">${record.title}</p>
          <p class="library-record-meta">${record.year || ''}</p>
        </div>
        <div class="record-particle-wrapper" style="height:60px">
          <div class="record-comment">${comment}</div>
          <canvas class="record-particle-canvas"></canvas>
          <div class="record-particle-bg"></div>
        </div>
      </div>
    `;
  }

  return `
    <div class="library-record library-record-list" data-id="${record.id}">
      ${poster}
      <div class="library-record-info">
        <p class="library-record-title">${record.title}</p>
        <p class="library-record-meta">${record.type === 'book' ? '书籍' : record.type === 'tv' ? '剧集' : '电影'} · ${record.year || ''}</p>
        <div class="library-record-rating">${rating}</div>
        <div class="record-particle-wrapper" style="margin-top:8px">
          <div class="record-comment ${record.comment ? '' : 'empty'}">${comment}</div>
          <canvas class="record-particle-canvas"></canvas>
          <div class="record-particle-bg"></div>
        </div>
      </div>
    </div>
  `;
}

const particleInstances = new Map();

function initParticleForRecord(canvas, commentEl) {
  if (particleInstances.has(canvas)) return;

  const wrapper = canvas.parentElement;
  const width = wrapper.offsetWidth;
  const height = wrapper.offsetHeight;

  canvas.width = width;
  canvas.height = height;

  const area = width * height;
  const count = Math.floor((area / 8000) * CONFIG.PARTICLE_DENSITY);

  const particles = [];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * width,
      y: Math.random() * height,
      baseX: 0, baseY: 0,
      vx: 0, vy: 0,
      size: Math.random() * CONFIG.PARTICLE_SIZE + 0.5,
      opacity: Math.random() * 0.25 + 0.05
    });
    particles[i].baseX = particles[i].x;
    particles[i].baseY = particles[i].y;
  }

  let isRevealed = false;
  let exploding = false;
  let gathering = false;

  const ctx = canvas.getContext('2d');

  function draw() {
    ctx.clearRect(0, 0, width, height);

    if (!isRevealed) {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.97)';
      ctx.fillRect(0, 0, width, height);

      particles.forEach(p => {
        if (!gathering) {
          p.vx += (Math.random() - 0.5) * 0.08;
          p.vy += (Math.random() - 0.5) * 0.08;
          p.vx *= 0.96;
          p.vy *= 0.96;
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 2) p.vx += 0.1;
          if (p.x > width - 2) p.vx -= 0.1;
          if (p.y < 2) p.vy += 0.1;
          if (p.y > height - 2) p.vy -= 0.1;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 168, 124, ${p.opacity})`;
        ctx.fill();
      });
    }

    requestAnimationFrame(draw);
  }

  draw();

  function explode() {
    if (exploding || isRevealed) return;
    exploding = true;

    particles.forEach(p => {
      const dx = p.x - width / 2;
      const dy = p.y - height / 2;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const speed = 6 + Math.random() * 10;
      p.vx = (dx / dist) * speed;
      p.vy = (dy / dist) * speed;
    });

    setTimeout(() => {
      isRevealed = true;
      exploding = false;
    }, 600);
  }

  function gather() {
    if (gathering || !isRevealed) return;
    gathering = true;

    particles.forEach(p => {
      p.vx = (p.baseX - p.x) * 0.15;
      p.vy = (p.baseY - p.y) * 0.15;
      p.opacity = 0;
    });

    const animate = () => {
      let done = true;
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.88;
        p.vy *= 0.88;
        if (Math.abs(p.baseX - p.x) > 1 || Math.abs(p.baseY - p.y) > 1) done = false;
        p.opacity = Math.min(0.3, p.opacity + 0.03);
      });
      if (!done) requestAnimationFrame(animate);
      else {
        gathering = false;
        isRevealed = false;
      }
    };
    animate();
  }

  const handleClick = (e) => {
    e.stopPropagation();
    if (isRevealed) {
      gather();
    } else {
      explode();
    }
  };

  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('touchend', handleClick);

  particleInstances.set(canvas, { explode, gather });
}

function displayRandomQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  const qEl = document.getElementById('mainQuote');
  const aEl = document.getElementById('quoteAuthor');

  qEl.style.opacity = '0';
  aEl.style.opacity = '0';

  setTimeout(() => {
    qEl.textContent = `"${q.text}"`;
    aEl.textContent = `— ${q.author}`;
    qEl.style.transition = 'opacity 1.5s ease';
    aEl.style.transition = 'opacity 1.5s ease 0.3s';
    qEl.style.opacity = '1';
    aEl.style.opacity = '0.6';
  }, 100);
}
